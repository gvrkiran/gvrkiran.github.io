<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kiran Garimella</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="description" content="Academic homepage of Kiran Garimella." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body data-page="home">

  <header>
    <div class="container nav">
      <a class="brand" id="brand" href="index.html"></a>
      <nav class="navlinks">
        <a href="publications.html">Publications</a>
        <a href="projects.html">Projects</a>
        <a href="teaching.html">Teaching</a>
        <a href="other.html">Other</a>
      </nav>
      <div class="actions">
        <button class="btn" id="themeBtn" aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="grid two hero-grid">
        <div>
          <div class="pill" id="location-pill"></div>
          <div class="spacer"></div>
          <h1 class="title-xl" id="hero-role"></h1>
          <p class="muted hero-tagline" id="hero-tagline"></p>
          <div class="spacer"></div>
          <div class="badges" id="keywords"></div>
          <div class="spacer"></div>
          <div class="controls">
            <a class="btn primary" id="emailBtn" href="#">Email</a>
            <a class="btn" id="cvBtn" href="#" target="_blank" rel="noreferrer">CV</a>
            <a class="btn" id="lnBtn" href="#" target="_blank" rel="noreferrer">LinkedIn</a>
            <a class="btn" id="twBtn" href="#" target="_blank" rel="noreferrer">Twitter</a>
            <a class="btn" id="schBtn" href="#" target="_blank" rel="noreferrer">Scholar</a>
          </div>
        </div>
        <div class="card photo-card">
          <div id="faceTracker" class="face-tracker">
            <img id="faceImage" class="face-image" src="" alt="Face following gaze" />
            <div id="faceLoading" class="face-loading" style="display:none;">Loading face...</div>
            <div id="faceError" class="face-tracker-error" style="display:none;">Error loading face images</div>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="grid three cta-cards">
        <a href="publications.html"><div class="card"><div class="content"><div style="font-weight:600">Publications</div><div class="muted" style="font-size:14px">Searchable list with topic filters</div><div class="muted" style="margin-top:8px">Explore &rarr;</div></div></div></a>
        <a href="projects.html"><div class="card"><div class="content"><div style="font-weight:600">Projects</div><div class="muted" style="font-size:14px">Selected research and prototypes</div><div class="muted" style="margin-top:8px">Explore &rarr;</div></div></div></a>
        <a href="teaching.html"><div class="card"><div class="content"><div style="font-weight:600">Teaching</div><div class="muted" style="font-size:14px">Courses and materials</div><div class="muted" style="margin-top:8px">Explore &rarr;</div></div></div></a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container row">
      <div id="copyright"></div>
      <div><a class="link" href="index.html">Back to top</a></div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script>
    (function(){
      function d(n,v){ if(typeof window[n]==='undefined'){ window[n]=v; (0,eval)("var "+n+"=window['"+n+"'];"); } }
      d('PROFILE',{name:'',role:'',tagline:'',location:'',email:'',socials:{}});
      d('KEYWORDS',[]); d('HIGHLIGHTS',[]); d('PROJECTS',[]); d('PUBLICATIONS',[]); d('TEACHING',[]); d('TALKS',[]); d('PRESS',[]);
    })();
  </script>
  <script src="main.js"></script>

  <script>
  (function(){
    var p = PROFILE;
    var pill = document.getElementById('location-pill');
    if (pill) pill.textContent = p.location || '';
    if (document.getElementById('hero-role')) document.getElementById('hero-role').textContent = p.role || '';
    if (document.getElementById('hero-tagline')) document.getElementById('hero-tagline').textContent = p.tagline || '';
    var kws = document.getElementById('keywords');
    if (kws) kws.innerHTML = (window.KEYWORDS||[]).map(function(t){ return '<span class="badge">'+t+'</span>'; }).join('');

    var email = document.getElementById('emailBtn');
    if (email) email.href = 'mailto:' + (p.email||'');
    [['lnBtn','linkedin'],['twBtn','twitter'],['cvBtn','cv'],['schBtn','scholar']].forEach(function(pair){
      var el = document.getElementById(pair[0]);
      if (el) { if (p.socials && p.socials[pair[1]]) el.href = p.socials[pair[1]]; else el.classList.add('hidden'); }
    });
  })();
  </script>
</body>
</html>
