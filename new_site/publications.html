<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Publications — Kiran Garimella</title>
  <link rel="stylesheet" href="css/themes/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Rutgers campus background on the body itself ── */
    .pub-page {
      background:
        url('rutgers_bg.png') center center / cover no-repeat fixed,
        var(--bg);
      background-blend-mode: overlay;
    }

    /* ── Full-body figure that zooms with scroll ── */
    .bg-person {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) scale(var(--person-scale, 0.35));
      transform-origin: bottom center;
      z-index: 1;
      pointer-events: none;
      will-change: transform;
      height: 90vh;
      width: auto;
    }
    .bg-person img {
      height: 100%;
      width: auto;
      object-fit: contain;
      /* multiply blends white → transparent against light backgrounds */
      mix-blend-mode: multiply;
      opacity: 0.18;
    }
    /* In dark mode, use screen blend (makes white glow, dark → transparent) */
    .dark .bg-person img {
      mix-blend-mode: screen;
      filter: invert(1);
      opacity: 0.12;
    }

    /* ── Content sits on top ── */
    header { position: sticky; z-index: 100; }
    main.container { position: relative; z-index: 10; }
    .footer { position: relative; z-index: 10; }

    /* Cards: translucent so the figure peeks through */
    .pub-page .card {
      background: color-mix(in srgb, var(--card) 92%, transparent);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .dark .pub-page .card {
      background: color-mix(in srgb, var(--card) 88%, transparent);
    }

    .pub-page .section-title {
      position: relative;
      z-index: 10;
    }

    /* Search bar backdrop */
    .pub-controls-wrap {
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }

    /* Scroll progress bar */
    .scroll-progress {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: var(--fg);
      opacity: 0.3;
      z-index: 200;
      width: 0%;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body data-page="publications" class="pub-page">
  <!-- Scroll progress bar -->
  <div class="scroll-progress" id="scrollProgress"></div>

  <!-- Full-body figure that scales with scroll -->
  <div class="bg-person" id="bgPerson">
    <img src="kiran_fullbody.png" alt="" />
  </div>

  <header>
    <div class="container nav">
      <a class="brand" id="brand" href="index.html"></a>
      <nav class="navlinks">
        <a href="publications.html">Publications</a>
        <a href="projects.html">Projects</a>
        <a href="teaching.html">Teaching</a>
        <a href="talks.html">Talks</a>
        <a href="press.html">Press</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="actions"><button class="btn" id="themeBtn" aria-label="Toggle theme">&#9728;&#65039;</button></div>
    </div>
  </header>

  <main class="container">
    <section>
      <div class="row">
        <div>
          <h1 style="margin:0">Publications</h1>
          <div class="muted">Search by title, venue, or author. Filter by year.</div>
        </div>
        <div class="controls">
          <a class="btn" id="cvBtn" href="#" target="_blank" rel="noreferrer">CV</a>
        </div>
      </div>
      <div class="spacer"></div>
      <div class="pub-controls-wrap">
        <div class="controls">
          <input type="search" id="pubSearch" placeholder="Search publications..." />
          <select id="pubTopic" class="select"></select>
        </div>
      </div>
      <div id="pub-list" class="list"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="container row">
      <div id="copyright"></div>
      <div><a class="link" href="index.html">Back to home</a></div>
    </div>
  </footer>

  <!-- Personalization (lite version for subpages) -->
  <script src="js/geolocation.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/returning-visitor.js"></script>
  <script src="js/personalization.js"></script>
  <script src="js/ambient-background.js"></script>
  <script src="js/personalization-lite.js"></script>

  <script src="data.js"></script>
  <script src="main.js"></script>

  <script>
    document.getElementById('cvBtn').href = PROFILE.cvUrl || '#';
  </script>

  <!-- Scroll-approach effect -->
  <script>
    (function () {
      var person = document.getElementById('bgPerson');
      var personImg = person ? person.querySelector('img') : null;
      var progressBar = document.getElementById('scrollProgress');

      // Scale range: starts far (small) → ends close (large)
      var SCALE_MIN = 0.3;
      var SCALE_MAX = 1.15;
      // Opacity range: starts very faint → ends more visible
      var OPACITY_MIN = 0.08;
      var OPACITY_MAX = 0.22;

      function onScroll() {
        var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        var docHeight = document.documentElement.scrollHeight - window.innerHeight;
        if (docHeight <= 0) return;

        var progress = Math.min(1, Math.max(0, scrollTop / docHeight));

        // Ease-in-out for a natural "approaching" feel
        var eased = progress < 0.5
          ? 2 * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;

        var scale = SCALE_MIN + (SCALE_MAX - SCALE_MIN) * eased;
        var opacity = OPACITY_MIN + (OPACITY_MAX - OPACITY_MIN) * eased;

        if (person) {
          person.style.setProperty('--person-scale', scale);
        }
        if (personImg) {
          personImg.style.opacity = opacity;
        }
        if (progressBar) {
          progressBar.style.width = (progress * 100) + '%';
        }
      }

      // Use passive scroll listener for performance
      window.addEventListener('scroll', onScroll, { passive: true });
      // Set initial state
      onScroll();
    })();
  </script>
</body>
</html>
