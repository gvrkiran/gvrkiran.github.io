<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Publications · Kiran Garimella</title>
  <meta name="description" content="Publications by Kiran Garimella." />
  <script>
    /* publications design router — same spirit as js/theme-engine.js:
       - picks one of the designs below, avoiding the previous pick
       - stays stable across in-session navigation (sessionStorage);
         reloading a design page keeps that design
       - the "↻ shuffle" button on each design links here with ?reroll=1
       - ?pub=N forces a specific design */
    (function () {
      const DESIGNS = [
        { n: 1, href: 'publications-classic.html', name: 'Classic list' },
        { n: 2, href: 'publications-grove.html',   name: 'The Orchard' },
        { n: 3, href: 'publications-stamps.html',  name: 'The Stamp Collection' },
        { n: 4, href: 'publications-library.html', name: 'The Library' },
      ];
      const MAX = DESIGNS.length;
      const url = new URL(location.href);
      const q = parseInt(url.searchParams.get('pub'), 10);
      const reroll = url.searchParams.has('reroll');
      const sess = parseInt(sessionStorage.getItem('current_pub') || '', 10);
      const last = parseInt(localStorage.getItem('last_pub') || '', 10);
      let pick;
      if (q >= 1 && q <= MAX) {
        pick = q;
      } else if (!reroll && sess >= 1 && sess <= MAX) {
        pick = sess;                                   // keep the design within a session
      } else {
        const avoid = reroll ? (sess || last) : last;  // never repeat what you just saw
        const candidates = DESIGNS.map(d => d.n).filter(n => n !== avoid);
        pick = candidates[Math.floor(Math.random() * candidates.length)];
      }
      sessionStorage.setItem('current_pub', String(pick));
      localStorage.setItem('last_pub', String(pick));
      location.replace(DESIGNS[pick - 1].href);
    })();
  </script>
</head>
<body>
  <noscript>
    <p style="font-family: Georgia, serif; max-width: 60ch; margin: 4rem auto; padding: 0 1rem;">
      Publications come in four designs:
      <a href="publications-classic.html">the classic list</a>,
      <a href="publications-grove.html">the orchard</a>,
      <a href="publications-stamps.html">the stamp collection</a>, or
      <a href="publications-library.html">the library</a>.
    </p>
  </noscript>
</body>
</html>
